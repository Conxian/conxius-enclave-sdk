name: "Governance request"
description: "Propose a policy, process, or governance-default change."
title: "[GOV] <short summary>"
body:
  - type: markdown
    attributes:
      value: |
        Use this template for policy, process, and governance-default changes.

        For support routing details, see [SUPPORT.md](https://github.com/Conxian/conxius-enclave-sdk/blob/main/SUPPORT.md).
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What policy/process needs to change and why?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the change you want made.
    validations:
      required: true
