name: SBOM

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-sbom
        run: cargo install cargo-sbom

      - name: Generate SPDX SBOM
        run: cargo sbom --format spdx-rs --output-file sbom.spdx.json

      - name: Generate CycloneDX SBOM
        run: cargo sbom --format cyclonedx-json --output-file sbom.cdx.json

      - name: Upload SBOM artifacts
        if: github.event_name != 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cdx.json
          retention-days: 90
