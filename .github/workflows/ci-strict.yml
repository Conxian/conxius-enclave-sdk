name: CI Strict

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ci-strict-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable

      - name: Run tests
        run: cargo test --all-features --verbose
        env:
          RUST_BACKTRACE: full

  lint:
    name: Linting
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          components: rustfmt, clippy
          toolchain: stable
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_HTTP_MULTIPLEXING: false
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          targets: wasm32-unknown-unknown
          toolchain: stable
      - name: Install wasm-pack
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145
        with:
          tool: wasm-pack
      - name: Build WASM
        run: |
          CFLAGS="-Dmemmove=__builtin_memmove -Dmemcpy=__builtin_memcpy -Dmemset=__builtin_memset -Dmemcmp=__builtin_memcmp" \
          wasm-pack build --release --target bundler --out-dir pkg
      - name: Verify WASM output
        run: |
          if [ ! -f "pkg/conxius_enclave_sdk_bg.wasm" ]; then
            echo "ERROR: WASM build failed"
            exit 1
          fi

  hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Check for forbidden files
        run: |
          FORBIDDEN=$(git ls-files | grep -E "^target/|^pkg/|^node_modules/" || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "ERROR: Forbidden files found"
            echo "$FORBIDDEN"
            exit 1
          fi
      - name: Check for sensitive extensions
        run: |
          SENSITIVE=$(git ls-files | grep -E "\.key$|\.pem$|\.p12$|\.jks$" || true)
          if [ -n "$SENSITIVE" ]; then
            echo "ERROR: Sensitive files found"
            echo "$SENSITIVE"
            exit 1
          fi
      - name: Verify Mainnet Principals
        run: |
          if grep -rnE "ST[123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,}" contracts/ src/ 2>/dev/null; then
            echo "ERROR: Mainnet principal keys found"
            exit 1
          fi
      - name: Verify Package Name
        run: |
          if ! grep -q 'name = "conxius-enclave-sdk"' Cargo.toml; then
            echo "ERROR: Wrong package name"
            exit 1
          fi

  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145
        with:
          tool: cargo-audit
      - name: Install cargo-deny
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145
        with:
          tool: cargo-deny
      - name: Prepare audit config
        run: |
          mkdir -p .cargo
          cp audit.toml .cargo/audit.toml
          cargo generate-lockfile
      - name: Run cargo audit
        run: cargo audit --file Cargo.lock
      - name: Run cargo deny
        run: cargo deny --config deny.toml --locked check advisories bans licenses sources
