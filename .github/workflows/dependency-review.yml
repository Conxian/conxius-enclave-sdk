name: Dependency Review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
permissions:
  contents: read
jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Dependency Review
        uses: actions/dependency-review-action@5a9f2c7e5e5e9d5e3e7d7f6c7a8b5d4e3c2b1a0f # v4.3.5
