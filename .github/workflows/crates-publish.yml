name: Publish to crates.io

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.10)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Conxian'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Configure sparse Cargo registry
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'YAMLEOF'
          [registries.crates-io]
          protocol = "sparse"
          index = "sparse+https://index.crates.io/"
          YAMLEOF

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "Error: CARGO_REGISTRY_TOKEN secret is not set"
            echo "Please add CARGO_REGISTRY_TOKEN to repository secrets"
            exit 1
          fi
          cargo publish --token "$CARGO_REGISTRY_TOKEN"
        continue-on-error: false

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
