name: WASM Runtime Evidence

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: wasm-runtime-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_MULTIPLEXING: false
  RUST_BACKTRACE: full
  WASM_EXPECTED_NODE_VERSION: 22.23.1
  WASM_EXPECTED_NPM_VERSION: 11.18.0
  WASM_EXPECTED_RUST_VERSION: 1.97.1
  WASM_EXPECTED_PLAYWRIGHT_VERSION: 1.54.2
  WASM_STRICT_TOOLCHAIN: "1"
  WASM_EXPECTED_TESTED_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
  WASM_PR_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
  WASM_MERGE_REF_SHA: ${{ github.event_name == 'pull_request' && github.sha || '' }}

jobs:
  runtime:
    name: Generated WASM runtime lanes
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Install Rust and WASM target
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # Rust 1.97.1
        with:
          toolchain: 1.97.1
          targets: wasm32-unknown-unknown

      - name: Install pinned wasm-pack
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: wasm-pack@0.15.0

      - name: Install pinned Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: tests/wasm/package-lock.json

      - name: Install pinned npm
        run: npm install --global --no-audit --no-fund npm@11.18.0

      - name: Install harness dependencies
        run: npm ci --prefix tests/wasm

      - name: Install pinned Chromium runtime
        run: tests/wasm/node_modules/.bin/playwright install --with-deps chromium

      - name: Execute Node, browser, worker, and bundler lanes
        env:
          WASM_RUNTIME_EVIDENCE_DIR: ${{ runner.temp }}/wasm-runtime-evidence
        run: ./scripts/wasm_runtime_evidence.sh

      - name: Upload runtime evidence manifest
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wasm-runtime-evidence-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          path: ${{ runner.temp }}/wasm-runtime-evidence
          if-no-files-found: error
          retention-days: 90
