name: Coverage Enforcement

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage Threshold (>= 70%)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # Rust 1.97.1
        with:
          toolchain: 1.97.1
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-llvm-cov@0.8.7

      - name: Enforce line coverage minimum
        run: cargo llvm-cov --locked --workspace --all-features --fail-under-lines 70 --summary-only
