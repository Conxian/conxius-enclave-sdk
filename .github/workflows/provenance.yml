name: Provenance Attestation

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      attestation_tag:
        description: "Tag to attest (e.g., v2.0.7)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: provenance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provenance:
    name: Generate SLSA Provenance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable

      - name: Build release artifacts
        run: |
          cargo build --release --lib --verbose
          mkdir -p dist
          # Find and copy the built library (platform-specific extension)
          # Crate name "conxius-enclave-sdk" produces "libconxius_enclave_sdk.so"
          if [ -f "target/release/libconxius_enclave_sdk.so" ]; then
            cp target/release/libconxius_enclave_sdk.so dist/
            echo "artifact=libconxius_enclave_sdk.so" >> $GITHUB_OUTPUT
          elif [ -f "target/release/libconxius_enclave_sdk.dylib" ]; then
            cp target/release/libconxius_enclave_sdk.dylib dist/
            echo "artifact=libconxius_enclave_sdk.so" >> $GITHUB_OUTPUT
          elif [ -f "target/release/libconxius_enclave_sdk.a" ]; then
            cp target/release/libconxius_enclave_sdk.a dist/
            echo "artifact=libconxius_enclave_sdk.a" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No library artifact found!"
            ls -la target/release/ | grep -E "libconxius|\.so|\.a|\.dylib"
            exit 1
          fi
          echo "Build artifacts copied to dist/"

      - name: Create Checksums
        id: checksum
        run: |
          if [ ! -f "dist/libconxius_enclave_sdk.so" ] && [ ! -f "dist/libconxius_enclave_sdk.a" ]; then
            echo "ERROR: Library artifact not found in dist/"
            ls -la dist/
            exit 1
          fi
          # Use the .so file if present, otherwise check for .a
          LIB_FILE=""
          if [ -f "dist/libconxius_enclave_sdk.so" ]; then
            LIB_FILE="dist/libconxius_enclave_sdk.so"
          else
            LIB_FILE="dist/libconxius_enclave_sdk.a"
          fi
          sha256sum "$LIB_FILE" > dist/checksums.txt
          echo "checksum=$(sha256sum $LIB_FILE | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "Checksum created for $LIB_FILE"

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifact-${{ github.ref_name }}
          path: |
            dist/libconxius_enclave_sdk.so
            dist/checksums.txt
          retention-days: 90

      - name: Generate SLSA Provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/libconxius_enclave_sdk.so

  provenance-attest:
    name: Create Release Attestation
    needs: provenance
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifact-${{ github.ref_name }}
          path: dist/

      - name: Verify attestation
        run: |
          echo "Provenance attestation created for: ${{ github.ref_name }}"
          echo "Artifacts verified and attested successfully"
          cat dist/checksums.txt

  release-attestation:
    name: Attach Attestation to Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify provenance workflow completed
        run: |
          echo "Release: ${{ github.ref_name }}"
          echo "Provenance attestation workflow completed"
