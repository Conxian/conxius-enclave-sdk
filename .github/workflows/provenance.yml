name: Provenance Attestation

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      attestation_tag:
        description: "Tag to attest (e.g., v2.0.7)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: provenance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provenance:
    name: Generate SLSA Provenance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable

      - name: Build release artifacts
        run: |
          cargo build --release --lib
          mkdir -p dist

      - name: Create Checksums
        id: checksum
        run: |
          cd target/release
          sha256sum libconclave_sdk.so > ../../dist/checksums.txt
          echo "artifact=libconclave_sdk.so" >> $GITHUB_OUTPUT
          echo "checksum=$(sha256sum libconclave_sdk.so | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.5.0
        with:
          name: release-artifact-${{ github.ref_name }}
          path: |
            dist/libconclave_sdk.so
            dist/checksums.txt
          retention-days: 90

      - name: Generate SLSA Provenance
        uses: actions/attest-build-provenance@e48d9e0c39b4b7aebfb16dc194da18e2b8c0dd3b # v1.5.0
        with:
          subject: "dist/{{ checksum }}"
          artifact_path: dist/checksums.txt
          sha256: ${{ steps.checksum.outputs.checksum }}

  provenance-attest:
    name: Create Release Attestation
    needs: provenance
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.5.0
        with:
          name: release-artifact-${{ github.ref_name }}
          path: dist/

      - name: Verify attestation
        run: |
          echo "Provenance attestation created for: ${{ github.ref_name }}"
          echo "Artifacts verified and attested successfully"
          cat dist/checksums.txt

  release-attestation:
    name: Attach Attestation to Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify provenance workflow completed
        run: |
          echo "Release: ${{ github.ref_name }}"
          echo "Provenance attestation workflow completed"
