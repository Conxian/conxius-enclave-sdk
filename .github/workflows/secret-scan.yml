name: Secret Scanning

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scanning:
    name: Gitleaks History Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      # Gitleaks is MIT-licensed. Pin both its release and the verified archive
      # checksum instead of relying on an unpinned third-party action.
      - name: Install pinned Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$(uname -m)" != "x86_64" ]]; then
            echo "error: this job requires an x86_64 runner for the pinned Gitleaks archive" >&2
            exit 1
          fi
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          archive_path="${RUNNER_TEMP}/${archive}"
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" \
            --output "$archive_path"
          printf '%s  %s\n' "$GITLEAKS_SHA256" "$archive_path" | sha256sum --check -
          mkdir -p "${RUNNER_TEMP}/gitleaks" "$HOME/.local/bin"
          tar -xzf "$archive_path" -C "${RUNNER_TEMP}/gitleaks"
          install -m 0755 "${RUNNER_TEMP}/gitleaks/gitleaks" "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          gitleaks version

      - name: Scan repository history
        run: >-
          gitleaks detect
          --source .
          --config .gitleaks.toml
          --log-opts="--all"
          --redact
          --exit-code 1
          --no-banner
