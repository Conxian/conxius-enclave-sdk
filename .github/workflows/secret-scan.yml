name: Secret Scanning

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  secret-scanning:
    name: GitHub Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1

      - name: Verify Secret Scanning Status
        run: |
          # GitHub's native secret scanning automatically scans all pushes and PRs
          # This check verifies the workflow runs as a CI gate
          echo "GitHub secret scanning is enabled for this repository"
          echo "All pushes and pull requests are automatically scanned"
          echo "If secrets are detected, the push/PR will be blocked by GitHub"
