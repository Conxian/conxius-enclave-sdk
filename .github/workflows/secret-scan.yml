name: Secret Scanning

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  security-events: write

jobs:
  secret-scanning:
    name: GitHub Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Secret Scanning
        uses: github/secret-scanning-action@v3
        with:
          # GitHub's native secret scanning is automatic for push events
          # This step ensures the check runs as part of CI
          adversarial_scan: false

      - name: Check for secret scanning alerts
        run: |
          # GitHub automatically scans for secrets on push
          # Check if there are any open secret scanning alerts
          echo "GitHub secret scanning is enabled for this repository"
          echo "New push/pull_request events will be scanned automatically"
          echo "Any detected secrets will block the push"
