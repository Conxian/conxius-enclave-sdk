name: Release Strict

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version to validate"
        required: true
        type: string
      publish_to_crates_io:
        description: "Publish to crates.io after all release evidence passes (only if absent)"
        required: true
        default: false
        type: boolean
      recover_existing_registry:
        description: "Verify an already-published registry artifact and recover the GitHub Release without re-publishing"
        required: true
        default: false
        type: boolean

concurrency:
  group: release-strict-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  validate-release:
    name: Validate Release Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy

      - name: Select expected release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ inputs.release_version }}"
          fi
          VERSION="${VERSION#v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Selected version: ${VERSION}"

      - name: Verify release metadata and lockfile
        run: .github/scripts/verify-release-metadata.sh "${{ steps.version.outputs.value }}"

      - name: Run locked tests
        run: cargo test --locked --all-features --verbose
        env:
          RUST_BACKTRACE: full

      - name: Run locked formatting and linting
        run: |
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Verify locked crates.io package
        run: cargo publish --locked --dry-run

  secret-scan:
    name: Full-history Secret Scan
    uses: ./.github/workflows/secret-scan.yml
    permissions:
      contents: read

  sbom-provenance:
    name: SBOM and Provenance
    needs:
      - validate-release
      - secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.97.1

      - name: Verify release metadata and lockfile
        run: .github/scripts/verify-release-metadata.sh "${{ needs.validate-release.outputs.version }}"

      - name: Build release package
        run: cargo package --locked

      - name: Locate packaged crate
        id: crate
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t crates < <(find target/package -maxdepth 1 -type f -name '*.crate' | sort)
          if [[ "${#crates[@]}" -ne 1 ]]; then
            echo "error: expected exactly one packaged crate" >&2
            exit 1
          fi
          echo "path=${crates[0]}" >> "$GITHUB_OUTPUT"

      - name: Create crate checksum
        id: checksum
        shell: bash
        run: |
          set -euo pipefail
          CHECKSUM_PATH="${{ steps.crate.outputs.path }}.sha256"
          sha256sum "${{ steps.crate.outputs.path }}" > "$CHECKSUM_PATH"
          echo "path=${CHECKSUM_PATH}" >> "$GITHUB_OUTPUT"

      - name: Install cargo-sbom
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-sbom@0.10.0

      - name: Generate SPDX SBOM
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p sbom
          cargo metadata --locked --format-version 1 >/dev/null
          # cargo-sbom 0.10.0 does not expose Cargo's --locked flag; the
          # explicit metadata gate above rejects a stale or missing lockfile.
          cargo sbom --output-format spdx_json_2_3 > sbom/release.spdx.json
          python3 -m json.tool sbom/release.spdx.json >/dev/null

      - name: Prepare flat release evidence bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-evidence
          cp "${{ steps.crate.outputs.path }}" release-evidence/
          cp "${{ steps.checksum.outputs.path }}" release-evidence/
          cp sbom/release.spdx.json release-evidence/
          sha256sum Cargo.lock > release-evidence/Cargo.lock.sha256

      - name: Attest release package provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.crate.outputs.path }}

      - name: Verify and retain release package provenance
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          raw_output="${RUNNER_TEMP}/provenance-verification.json"
          gh attestation verify \
            "${{ steps.crate.outputs.path }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-strict.yml" \
            --source-ref "${GITHUB_REF}" \
            --format json > "$raw_output"
          expected_sha256="$(awk 'NF {print $1; exit}' "${{ steps.checksum.outputs.path }}")"
          export EXPECTED_SHA256="$expected_sha256"
          python3 - "$raw_output" release-evidence/provenance-verification.json <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          raw_path, output_path = sys.argv[1:]
          expected_sha256 = os.environ["EXPECTED_SHA256"]
          with open(raw_path, encoding="utf-8") as f:
              payload = json.load(f)
          if not isinstance(payload, list) or not payload:
              raise SystemExit("provenance verification returned no attestations")

          attestations = []
          matching_subject = False
          for item in payload:
              result = item.get("verificationResult", {})
              statement = result.get("statement", {})
              subjects = []
              for subject in statement.get("subject", []) or []:
                  digest = subject.get("digest", {}) or {}
                  sha256 = digest.get("sha256")
                  if sha256 == expected_sha256:
                      matching_subject = True
                  subjects.append({
                      "name": subject.get("name"),
                      "sha256": sha256,
                  })
              certificate = (result.get("signature", {}) or {}).get("certificate", {}) or {}
              identity = {
                  key: certificate[key]
                  for key in ("subjectAlternativeName", "issuer", "oidcIssuer")
                  if certificate.get(key)
              }
              timestamps = []
              for timestamp in result.get("verifiedTimestamps", []) or []:
                  if isinstance(timestamp, dict):
                      timestamps.append({
                          key: timestamp[key]
                          for key in ("kind", "timestamp", "logId", "logIndex")
                          if key in timestamp
                      })
              attestations.append({
                  "certificateIdentity": identity,
                  "predicateType": statement.get("predicateType"),
                  "subjects": subjects,
                  "verifiedTimestamps": timestamps,
              })

          if not matching_subject:
              raise SystemExit("provenance subject digest does not match the packaged crate")

          record = {
              "attestationCount": len(attestations),
              "expectedSubjectSha256": expected_sha256,
              "policy": {
                  "repository": os.environ["GITHUB_REPOSITORY"],
                  "signerWorkflow": f"{os.environ['GITHUB_REPOSITORY']}/.github/workflows/release-strict.yml",
                  "sourceCommit": os.environ["GITHUB_SHA"],
                  "sourceRef": os.environ["GITHUB_REF"],
              },
              "verified": True,
              "verification": "gh attestation verify --format json",
              "attestations": attestations,
          }
          Path(output_path).write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Create release evidence manifest
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate-release.outputs.version }}
          RELEASE_TAG: v${{ needs.validate-release.outputs.version }}
          RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_REF: ${{ github.ref }}
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          CRATE_PATH: ${{ steps.crate.outputs.path }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          evidence_dir = Path("release-evidence")

          def sha256(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          crate_path = evidence_dir / Path(os.environ["CRATE_PATH"]).name
          sbom_path = evidence_dir / "release.spdx.json"
          provenance_path = evidence_dir / "provenance-verification.json"
          manifest = {
              "package": "conxius-enclave-sdk",
              "version": os.environ["RELEASE_VERSION"],
              "tag": os.environ["RELEASE_TAG"],
              "commit": os.environ["RELEASE_COMMIT"],
              "sourceCommit": os.environ["RELEASE_COMMIT"],
              "sourceRef": os.environ["RELEASE_REF"],
              "workflow": "release-strict",
              "crate": crate_path.name,
              "crateSha256": sha256(crate_path),
              "sbom": sbom_path.name,
              "sbomSha256": sha256(sbom_path),
              "lockSha256": sha256(Path("Cargo.lock")),
              "lockfileSha256File": "Cargo.lock.sha256",
              "provenanceVerification": provenance_path.name,
              "provenanceVerificationSha256": sha256(provenance_path),
              "workflowRun": {
                  "repository": os.environ["REPOSITORY"],
                  "workflow": os.environ["WORKFLOW_NAME"],
                  "runId": int(os.environ["WORKFLOW_RUN_ID"]),
                  "runAttempt": int(os.environ["WORKFLOW_RUN_ATTEMPT"]),
                  "event": os.environ["EVENT_NAME"],
                  "ref": os.environ["RELEASE_REF"],
                  "commit": os.environ["RELEASE_COMMIT"],
              },
          }
          (evidence_dir / "release-manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Verify package and attested evidence consistency
        shell: bash
        run: |
          set -euo pipefail
          crate="release-evidence/$(basename "${{ steps.crate.outputs.path }}")"
          checksum="release-evidence/$(basename "${{ steps.checksum.outputs.path }}")"
          .github/scripts/verify-release-artifacts.sh \
            "${{ needs.validate-release.outputs.version }}" \
            "$crate" \
            "$checksum" \
            release-evidence/release.spdx.json \
            release-evidence/release-manifest.json

      - name: Upload attested release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-${{ needs.validate-release.outputs.version }}-attested
          path: release-evidence
          if-no-files-found: error
          retention-days: 90

  publish-crates-io:
    name: Publish to crates.io (Automatic Tag / Manual Recovery)
    if: >-
      ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
          || (github.event_name == 'workflow_dispatch'
              && (inputs.publish_to_crates_io || inputs.recover_existing_registry)) }}
    needs:
      - validate-release
      - secret-scan
      - sbom-provenance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.97.1

      - name: Enforce publishing from the validated release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "error: publishing requires a release tag" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "v${{ needs.validate-release.outputs.version }}" ]]; then
            echo "error: publish tag does not match the validated version" >&2
            exit 1
          fi

      - name: Validate manual recovery mode
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          PUBLISH_TO_CRATES_IO: ${{ inputs.publish_to_crates_io }}
          RECOVER_EXISTING_REGISTRY: ${{ inputs.recover_existing_registry }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$PUBLISH_TO_CRATES_IO" == "true" && "$RECOVER_EXISTING_REGISTRY" == "true" ]]; then
            echo "error: choose either publish_to_crates_io or recover_existing_registry, not both" >&2
            exit 1
          fi

      - name: Verify release metadata and lockfile
        run: .github/scripts/verify-release-metadata.sh "${{ needs.validate-release.outputs.version }}"

      - name: Download attested release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-evidence-${{ needs.validate-release.outputs.version }}-attested
          path: release-evidence

      - name: Rebuild and compare the attested crate
        shell: bash
        run: |
          set -euo pipefail
          cargo package --locked
          mapfile -t local_crates < <(find target/package -maxdepth 1 -type f -name '*.crate' | sort)
          mapfile -t attested_crates < <(find release-evidence -maxdepth 1 -type f -name '*.crate' | sort)
          if [[ "${#local_crates[@]}" -ne 1 || "${#attested_crates[@]}" -ne 1 ]]; then
            echo "error: expected one local crate and one attested crate" >&2
            exit 1
          fi
          local_sha="$(sha256sum "${local_crates[0]}" | awk '{print $1}')"
          attested_sha="$(sha256sum "${attested_crates[0]}" | awk '{print $1}')"
          if [[ "$local_sha" != "$attested_sha" ]]; then
            echo "error: publish candidate differs from the attested release package" >&2
            exit 1
          fi

      - name: Verify downloaded release evidence
        shell: bash
        run: |
          set -euo pipefail
          crate="$(find release-evidence -maxdepth 1 -type f -name '*.crate' -print -quit)"
          checksum="$(find release-evidence -maxdepth 1 -type f -name '*.sha256' ! -name 'Cargo.lock.sha256' -print -quit)"
          .github/scripts/verify-release-artifacts.sh \
            "${{ needs.validate-release.outputs.version }}" \
            "$crate" \
            "$checksum" \
            release-evidence/release.spdx.json \
            release-evidence/release-manifest.json

      - name: Preflight crates.io token
        if: >-
          ${{ github.event_name == 'push'
              || (github.event_name == 'workflow_dispatch' && inputs.publish_to_crates_io) }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN}" ]]; then
            echo "error: CARGO_REGISTRY_TOKEN is missing" >&2
            exit 1
          fi

      - name: Publish to crates.io
        if: >-
          ${{ github.event_name == 'push'
              || (github.event_name == 'workflow_dispatch' && inputs.publish_to_crates_io) }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}"

      - name: Verify crates.io artifact matches the attested crate
        shell: bash
        run: |
          set -euo pipefail
          crate="$(find release-evidence -maxdepth 1 -type f -name '*.crate' -print -quit)"
          checksum="$(find release-evidence -maxdepth 1 -type f -name '*.sha256' ! -name 'Cargo.lock.sha256' -print -quit)"
          .github/scripts/verify-registry-artifact.sh \
            "${{ needs.validate-release.outputs.version }}" \
            "$crate" \
            "$checksum" \
            release-evidence/registry-verification.json

      - name: Add registry comparison to release manifest
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          evidence_dir = Path("release-evidence")
          manifest_path = evidence_dir / "release-manifest.json"
          registry_path = evidence_dir / "registry-verification.json"
          with manifest_path.open(encoding="utf-8") as f:
              manifest = json.load(f)
          manifest["registryVerification"] = registry_path.name
          manifest["registryVerificationSha256"] = hashlib.sha256(registry_path.read_bytes()).hexdigest()
          manifest["registryVerified"] = True
          manifest_path.write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Verify final release evidence bundle
        shell: bash
        run: |
          set -euo pipefail
          crate="$(find release-evidence -maxdepth 1 -type f -name '*.crate' -print -quit)"
          checksum="$(find release-evidence -maxdepth 1 -type f -name '*.sha256' ! -name 'Cargo.lock.sha256' -print -quit)"
          .github/scripts/verify-release-artifacts.sh \
            "${{ needs.validate-release.outputs.version }}" \
            "$crate" \
            "$checksum" \
            release-evidence/release.spdx.json \
            release-evidence/release-manifest.json

      - name: Upload final release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-${{ needs.validate-release.outputs.version }}
          path: release-evidence
          if-no-files-found: error
          retention-days: 90

  create-github-release:
    name: Create GitHub Release
    if: >-
      ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
          || (github.event_name == 'workflow_dispatch'
              && (inputs.publish_to_crates_io || inputs.recover_existing_registry)) }}
    needs:
      - validate-release
      - publish-crates-io
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-evidence-${{ needs.validate-release.outputs.version }}
          path: release-evidence

      - name: Create GitHub Release with evidence bundle
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release-evidence/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
