name: Release Strict

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version to validate"
        required: true
        type: string
      publish_to_crates_io:
        description: "Publish to crates.io after validation"
        required: true
        default: false
        type: boolean

concurrency:
  group: release-strict-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  attestations: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  validate-release:
    name: Validate Release Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable

      - name: Select expected release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ inputs.release_version }}"
          fi
          VERSION="${VERSION#v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Selected version: ${VERSION}"

      - name: Verify release metadata
        run: .github/scripts/verify-release-metadata.sh "${{ steps.version.outputs.value }}"

      - name: Run tests
        run: cargo test --all-features --verbose
        env:
          RUST_BACKTRACE: full

      - name: Run linting
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Verify crates.io package
        run: cargo publish --dry-run --allow-dirty

  sbom-provenance:
    name: SBOM and Provenance
    needs: validate-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable

      - name: Verify release metadata
        run: .github/scripts/verify-release-metadata.sh "${{ needs.validate-release.outputs.version }}"

      - name: Build release package
        run: cargo package --allow-dirty --no-verify

      - name: Locate packaged crate
        id: crate
        shell: bash
        run: |
          mapfile -t crates < <(find target/package -maxdepth 1 -type f -name '*.crate' | sort)
          if [[ "${#crates[@]}" -ne 1 ]]; then
            echo "ERROR: expected exactly one packaged crate" >&2
            exit 1
          fi
          echo "path=${crates[0]}" >> "$GITHUB_OUTPUT"

      - name: Install Syft
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9
        with:
          tool: syft

      - name: Generate SPDX SBOM
        run: |
          mkdir -p sbom
          syft "${{ steps.crate.outputs.path }}" -o spdx-json=sbom/release.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-sbom-${{ needs.validate-release.outputs.version }}
          path: sbom/release.spdx.json
          if-no-files-found: error
          retention-days: 90

      - name: Attest release provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.crate.outputs.path }}

  publish-crates-io:
    name: Publish to crates.io
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_crates_io }}
    needs:
      - validate-release
      - sbom-provenance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable

      - name: Enforce publish from release tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "ERROR: publishing requires a release tag"
            exit 1
          fi

      - name: Verify release metadata
        run: .github/scripts/verify-release-metadata.sh "${{ inputs.release_version }}"

      - name: Preflight crates.io token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN}" ]]; then
            echo "ERROR: CARGO_REGISTRY_TOKEN is missing"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --token "${CARGO_REGISTRY_TOKEN}"

  create-github-release:
    name: Create GitHub Release
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs: [validate-release, sbom-provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-publish-crates-io:
    name: Auto-Publish to crates.io
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs: [validate-release, sbom-provenance]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --token "${CARGO_REGISTRY_TOKEN}"
