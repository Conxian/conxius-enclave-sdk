name: Security

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: "31 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-audit

      - name: Prepare audit config and lockfile
        shell: bash
        run: |
          mkdir -p .cargo
          cp audit.toml .cargo/audit.toml
          cargo generate-lockfile

      - name: Run cargo audit
        run: cargo audit --file Cargo.lock

  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-deny

      - name: Prepare lockfile
        run: cargo generate-lockfile

      - name: Run cargo deny
        run: cargo deny --config deny.toml --locked check advisories bans licenses sources
