<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WASM runtime evidence</title>
    <meta id="runtime-marker" content="pending" />
  </head>
  <body>
    <pre id="result">WASM_RUNTIME_PENDING</pre>
    <script type="module">
      const result = document.getElementById("result");
      const marker = document.getElementById("runtime-marker");

      function errorDetails(error) {
        return {
          code: error && typeof error === "object" ? error.code ?? null : null,
          message: error instanceof Error ? error.message : String(error),
        };
      }

      function runWorker() {
        return new Promise((resolve, reject) => {
          const worker = new Worker("./worker.mjs", { type: "module" });
          const timeout = setTimeout(() => {
            worker.terminate();
            reject(new Error("WASM Web Worker timed out"));
          }, 10000);
          worker.onmessage = (event) => {
            clearTimeout(timeout);
            worker.terminate();
            if (event.data?.ok) {
              resolve(event.data);
            } else {
              reject(new Error(event.data?.message ?? "WASM worker failed"));
            }
          };
          worker.onerror = (event) => {
            clearTimeout(timeout);
            worker.terminate();
            reject(new Error(event.message || "WASM worker failed to load"));
          };
        });
      }

      try {
        const wasmModule = await import("./conxius_enclave_sdk.js");
        const assertionModule = await import("./boundary_assertions.mjs");
        const { default: init, ...api } = wasmModule;
        const { runBoundaryAssertions } = assertionModule;
        await init();
        const mainChecks = runBoundaryAssertions(api);
        const workerResult = await runWorker();
        result.textContent = JSON.stringify(
          { mainChecks: mainChecks.length, workerChecks: workerResult.checks },
          null,
          2,
        );
        marker.setAttribute("content", "ok");
        document.title = "WASM_RUNTIME_OK";
      } catch (error) {
        result.textContent = JSON.stringify(errorDetails(error), null, 2);
        marker.setAttribute("content", "failed");
        document.title = "WASM_RUNTIME_FAILED";
      }
    </script>
  </body>
</html>
